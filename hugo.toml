baseURL = "https://middlewaymusings.com"
languageCode = "en-us"
title = "Middle Way Musings"
theme = "paper"
paginate = 10

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10

[taxonomies]
    tag = "tags"
    series = "series"
    
# needed to  render raw HTML (e.g. <sub>, <sup>, <kbd>, <mark>)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  # meta
  description = "Sharing reflections on Buddhist philosophy and practice from the perspective of a Western European monk in India following the Madhyamaka school of thought."

  # google analytics
  googleAnalytics = "G-9DKZ2SYTQK"

  # env
  env = "production"

  # color style
  color = "linen"                           # linen, wheat, gray, light

  # header social icons
  github = "nickpettican"                   # github.com/YOUR_GITHUB_ID
  instagram = "middlewaymonk"               # instagram.com/YOUR_INSTAGRAM_ID
  linkedin = "nicolaspettican"              # linkedin.com/in/YOUR_LINKEDIN_ID
  #rss = true                               # show rss icon

  # home page profile
  avatar = "middlewaymonk@gmail.com"      # gravatar email or image url
  avatar_url = "/images/nt-sm.jpg"
  name = "Tenpa Bhikshu (Nicolas Pettican)"
  bio = "I am a fully ordained Buddhist monk currently residing in a monastery in the Himalayas."


  # misc
  disableHLJS = true                        # disable highlight.js
  monoDarkIcon = true                       # show monochrome dark mode icon
  #gravatarCdn = "GRAVATAR_CDN_LINK"        # e.g. "https://cdn.v2ex.com/gravatar/"
  #graphCommentId = "YOUR_GRAPH_COMMENT_ID" # use graph comment (disqus alternative)
  commentBoxId = "5748664181981184-proj"    # use comment box (disqus alternative)
  math = true                               # enable KaTex math typesetting globally